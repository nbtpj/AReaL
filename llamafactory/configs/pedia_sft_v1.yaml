# Single-machine SFT for pedia_8b_SFT_v1 (10,661 samples).
# Trained model + checkpoint exported under pedia_model/pedia_8b_SFT_v1/.
# Dataset (train.json + dataset_info.json + indexed images/) lives under pedia_data.

model_name_or_path: /storage/openpsi/models/Qwen3-VL-8B-Thinking
image_max_pixels: 6291456
video_max_pixels: 16384
trust_remote_code: true

stage: sft
do_train: true
finetuning_type: full
freeze_vision_tower: true
freeze_multi_modal_projector: true
freeze_language_model: false

dataset_dir: /storage/openpsi/data/lcy_image_edit/pedia_data/pedia_sft_v1
dataset: pedia_sft_v1
template: qwen3_vl
cutoff_len: 65536
preprocessing_num_workers: 32
dataloader_num_workers: 32

output_dir: /storage/openpsi/data/lcy_image_edit/pedia_model/pedia_8b_SFT_v1
logging_steps: 10
plot_loss: true
overwrite_output_dir: true
save_only_model: false
report_to: tensorboard

per_device_train_batch_size: 1
gradient_accumulation_steps: 4  # 1-node 8 GPU -> ga=4 to keep effective batch = 32 (original 4-node x 8 GPU x bs1 x ga1)
learning_rate: 1.0e-05
num_train_epochs: 1.0
lr_scheduler_type: cosine
warmup_ratio: 0.1
weight_decay: 0.01
bf16: true
gradient_checkpointing: true
ddp_timeout: 180000000

save_strategy: steps
save_steps: 20
save_total_limit: 3

# Path resolved by `train_v1.sh` which cd's into the llamafactory directory.
deepspeed: configs/ds_z2_config.json
